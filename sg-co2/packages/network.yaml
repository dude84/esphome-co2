# Reusable network config: wifi / api / ota / captive_portal / web_server.
# Remote git packages CANNOT use !secret — every secret is a ${substitution}
# that the consumer fills from its own !secret.
api:
  reboot_timeout: 0s
  encryption:
    key: ${api_password}

ota:
  - platform: esphome
    password: ${ota_password}

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  fast_connect: true
  use_address: ${static_ip}

  # Fallback hotspot (captive portal) if wifi fails
  ap:
    ssid: ${ap_ssid}
    password: ${ap_password}

captive_portal:

web_server:
  port: 80
  version: 3
